name: Feature Request
description: Suggest an improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What behavior or API do you want?
    validations:
      required: true

  - type: textarea
    id: compatibility
    attributes:
      label: EIP-3009 Compatibility
      description: Note any impact on signing, nonce handling, calldata, or contract compatibility.
    validations:
      required: false
